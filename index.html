<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heal-n-Soothe: The Systemic Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@400;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #0f172a; color: #ffffff; overflow: hidden; margin: 0; }
        .video-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        canvas { max-width: 100%; max-height: 80vh; border: 4px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); background: #ffffff; border-radius: 12px; }
        .caption-overlay { position: absolute; bottom: 120px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 50; }
        .caption-text { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); padding: 10px 24px; border-radius: 12px; font-size: 1rem; font-weight: 700; display: inline-block; transition: all 0.3s ease; border: 1px solid #3b82f6; color: #ffffff; max-width: 85%; }
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: #334155; }
        .progress-bar { height: 100%; background: #4ade80; transition: width 0.1s linear; }
        #startOverlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); z-index: 100; }
        .play-button { background: #4ade80; color: #064e3b; padding: 16px 48px; border-radius: 9999px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); transition: all 0.3s; }
        .play-button:hover:not(:disabled) { transform: scale(1.05); background: #22c55e; box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); }
        .play-button:disabled { background: #475569; cursor: not-allowed; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4ade80; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="caption-overlay"><div id="caption" class="caption-text opacity-0">...</div></div>
        <canvas id="filmCanvas"></canvas>
        <div class="progress-container"><div id="timer" class="progress-bar" style="width: 0%"></div></div>
        <div id="startOverlay" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 text-white italic">The Systemic Journey</h1>
            <p class="text-slate-400 max-w-md mb-10 text-lg uppercase tracking-widest font-bold">Heal-n-Soothe<sup class="text-sm">®</sup></p>
            <button id="startBtn" onclick="prepareAndStart()" class="play-button text-xl flex items-center justify-center min-w-[240px]"><span>Start Animation</span></button>
            <p id="loadingMsg" class="mt-4 text-sm text-slate-500 opacity-0 transition-opacity">Preparing Voiceover...</p>
        </div>
        <div class="controls absolute bottom-10 flex gap-6 z-50">
            <button id="toggleBtn" onclick="togglePlayback()" class="text-xs font-bold text-slate-500 hover:text-white uppercase tracking-widest">Pause</button>
            <span id="timestamp" class="text-xs font-mono text-slate-500">00:00 / 00:30</span>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('filmCanvas');
        const ctx = canvas.getContext('2d');
        const caption = document.getElementById('caption');
        const timer = document.getElementById('timer');
        const timestamp = document.getElementById('timestamp');
        const startBtn = document.getElementById('startBtn');
        const loadingMsg = document.getElementById('loadingMsg');

        let isPlaying = false, currentTime = 0, lastTime = 0, audioPlayer = null, time_val = 0;
        const TOTAL_DURATION = 30000;

        const particles = Array.from({length: 40}, () => ({ x: Math.random()*1000, y: Math.random()*600, size: 3+Math.random()*5, speed: 5+Math.random()*5, color: "#4ade80" }));
        const bloodFibrins = Array.from({length: 15}, () => ({ x: Math.random()*1000, y: Math.random()*600, size: 20+Math.random()*30, active: true }));
        const jointFibrins = Array.from({length: 10}, () => ({ x1: -40+Math.random()*80, y1: -20+Math.random()*40, x2: -40+Math.random()*80, y2: -20+Math.random()*40, active: true }));

        const script = [
            { start: 0, end: 4000, text: "Chronic discomfort holds you back from the life you love." },
            { start: 4000, end: 8500, text: "But taking Heal-n-Soothe capsules on an empty stomach triggers a powerful change." },
            { start: 8500, end: 12500, text: "These enzymes bypass digestion, entering your systemic circulation directly." },
            { start: 12500, end: 20000, text: "The biological vacuum begins! Enzymes dismantle fibrin webs and clear debris from your blood." },
            { start: 20000, end: 26000, text: "Deep inside the joint, inflammation is cooled and scar tissue is broken down." },
            { start: 26000, end: 30000, text: "A total breakthrough! Happy mobility is restored for all of life's adventures." }
        ];

        const apiKey = ""; // Insert your Google AI API key here

        async function generateVoiceover() {
            const fullText = script.map(s => s.text).join(" ");
            const payload = {
                contents: [{ parts: [{ text: `(Pause for 1 second) Then say in a warm, cheerful, professional male voice: ${fullText}` }] }],
                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } } } }
            };
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json();
            const audioData = result.candidates[0].content.parts[0].inlineData;
            const binaryString = window.atob(audioData.data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavBlob = new Blob([bytes], { type: 'audio/wav' });
            return URL.createObjectURL(wavBlob);
        }

        async function prepareAndStart() {
            startBtn.disabled = true; startBtn.innerHTML = '<span class="loader"></span>Preparing...';
            loadingMsg.classList.remove('opacity-0');
            try {
                const audioUrl = await generateVoiceover();
                audioPlayer = new Audio(audioUrl);
                audioPlayer.addEventListener('canplaythrough', () => startFilm(), { once: true });
                audioPlayer.load();
            } catch (err) { startBtn.innerHTML = 'Error. Check API Key.'; startBtn.disabled = false; }
        }

        function startFilm() {
            document.getElementById('startOverlay').classList.add('hidden');
            isPlaying = true; currentTime = 0;
            if (audioPlayer) setTimeout(() => audioPlayer.play(), 200);
            requestAnimationFrame(loop);
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            document.getElementById('toggleBtn').innerText = isPlaying ? "Pause" : "Play";
            if (audioPlayer) isPlaying ? audioPlayer.play() : audioPlayer.pause();
        }

        function drawFace(ctx, x, y, emotion = 'neutral') {
            ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(x - 8, y - 5, 2, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(x + 8, y - 5, 2, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath();
            if (emotion === 'happy') ctx.arc(x, y + 5, 8, 0.2, Math.PI - 0.2, false);
            else if (emotion === 'sad') ctx.arc(x, y + 12, 8, Math.PI + 0.2, Math.PI * 2 - 0.2, false);
            else { ctx.moveTo(x - 6, y + 8); ctx.lineTo(x + 6, y + 8); }
            ctx.stroke();
        }

        function drawCharacter(x, y, scale, action = 'still') {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale); ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 4; ctx.lineCap = "round";
            ctx.beginPath(); ctx.arc(0, -120, 30, 0, Math.PI * 2); ctx.stroke();
            let emotion = (action === 'pain') ? 'sad' : (action === 'exercise') ? 'happy' : 'neutral';
            drawFace(ctx, 0, -120, emotion);
            if (action === 'drink') {
                const cycle = (Date.now() / 800) % 1; const handY = -120 + (1 - cycle) * 50;
                ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(25, -90); ctx.lineTo(15, handY); ctx.stroke();
                ctx.fillStyle = "#4ade80"; ctx.fillRect(10, handY - 10, 10, 20); ctx.strokeStyle = "#000"; ctx.strokeRect(10, handY - 10, 10, 20);
                ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(-30, -100); ctx.stroke();
                ctx.fillStyle = "rgba(59, 130, 246, 0.4)"; ctx.fillRect(-45, -130, 20, 30); ctx.strokeRect(-45, -130, 20, 30);
            } else if (action === 'exercise') {
                const swing = Math.sin(Date.now()/150) * 40;
                ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(-40, -30 + swing); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(40, -30 - swing); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-30 + swing, 100); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(30 - swing, 100); ctx.stroke();
            } else if (action === 'pain') {
                ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(-20, -20); ctx.lineTo(-10, 50); ctx.stroke();
                ctx.beginPath(); ctx.arc(-12, 60, 15, 0, Math.PI*2); ctx.fillStyle="rgba(239,68,68,0.4)"; ctx.fill();
            }
            ctx.beginPath(); ctx.moveTo(0, -90); ctx.lineTo(0, 20); ctx.stroke();
            if (action !== 'exercise') { ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-20, 100); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(20, 100); ctx.stroke(); }
            ctx.restore();
        }

        function drawEsophagus(time) {
            const w = canvas.width, h = canvas.height;
            ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 40;
            ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h*0.6); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(w/2 + 30, h*0.7, 80, 120, Math.PI/4, 0, Math.PI*2);
            ctx.fillStyle = "#fff"; ctx.fill(); ctx.stroke();
            for(let i=0; i<3; i++) {
                const pillProg = ((time + i*800) % 3000 / 3000);
                const pillY = pillProg * h * 0.75;
                ctx.fillStyle = "#4ade80"; ctx.fillRect(w/2 - 5, pillY, 10, 25); ctx.strokeStyle = "#000"; ctx.strokeRect(w/2-5, pillY, 10, 25);
            }
        }

        function drawSystemicAction(time) {
            const w = canvas.width, h = canvas.height;
            ctx.fillStyle = "#f1f5f9"; ctx.fillRect(0,0,w,h);
            ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 20; ctx.strokeRect(0, h*0.2, w, h*0.6);
            bloodFibrins.forEach(f => { if (f.active) { ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(f.x + f.size, f.y + 10); ctx.strokeStyle = "rgba(71,85,105,0.3)"; ctx.stroke(); } });
            particles.forEach(p => {
                p.x += p.speed; if (p.x > w + 20) p.x = -20;
                bloodFibrins.forEach(f => { if (Math.hypot(p.x - f.x, p.y - f.y) < 30) f.active = false; });
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fillStyle = "#4ade80"; ctx.shadowBlur = 10; ctx.shadowColor = "#4ade80"; ctx.fill(); ctx.shadowBlur = 0;
            });
        }

        function drawJoint(healing) {
            const w = canvas.width, h = canvas.height, midX = w/2, midY = h/2;
            ctx.save(); ctx.translate(midX, midY);
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.moveTo(-50,-150); ctx.lineTo(50,-150); ctx.lineTo(70,-20); ctx.bezierCurveTo(80,0,-80,0,-70,-20); ctx.closePath(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-70,20); ctx.bezierCurveTo(-80,0,80,0,70,20); ctx.lineTo(50,150); ctx.lineTo(-50,150); ctx.closePath(); ctx.stroke();
            jointFibrins.forEach(f => { if (f.active) { ctx.beginPath(); ctx.moveTo(f.x1, f.y1); ctx.lineTo(f.x2, f.y2); ctx.strokeStyle = "rgba(148,163,184,0.8)"; ctx.stroke(); } });
            const opacity = 1 - healing;
            ctx.beginPath(); ctx.arc(0,0,120,0,Math.PI*2); ctx.fillStyle = `rgba(239,68,68,${opacity*0.7})`; ctx.fill();
            if (healing > 0.1) {
                for(let i=0; i<15; i++) {
                    const a = (time_val/400) + i, ex = Math.cos(a)*50, ey = Math.sin(a)*20;
                    jointFibrins.forEach(f => { if (Math.hypot(ex - f.x1, ey - f.y1) < 15) f.active = false; });
                    ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI*2); ctx.fillStyle = "#3b82f6"; ctx.fill();
                }
            }
